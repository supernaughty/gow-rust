[package]
name = "gow-touch"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "GNU touch — update file timestamps with Windows symlink-self support."

[[bin]]
name = "touch"
path = "src/main.rs"

[lib]
name = "uu_touch"
path = "src/lib.rs"

[dependencies]
gow-core = { path = "../gow-core" }
clap = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
filetime = { workspace = true }
# Per-crate deps (D-20b — not in workspace.dependencies):
jiff = "0.2"
parse_datetime = "0.14"

[build-dependencies]
embed-manifest = "1.5"

[dev-dependencies]
assert_cmd = { workspace = true }
predicates = { workspace = true }
tempfile = { workspace = true }
